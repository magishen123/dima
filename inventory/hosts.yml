---
all:
  children:
    # ── Linux hosts (RedOS) ──
    linux:
      children:
        isp_group:
          hosts:
            isp:
              ansible_host: 127.0.0.1
              ansible_connection: local        # Ansible runs from ISP itself
              hostname: isp.sirius-exam.org
              isp_wan_iface: enp7s1
              isp_hq_connection: ens19
              isp_br_connection: ens20

        hq:
          hosts:
            hq-srv:
              ansible_host: 192.168.100.2      # HQ-SRV IP
              hostname: hq-srv.sirius-exam.org
              gateway: 192.168.100.1           # HQ-RTR

            hq-cli:
              ansible_host: 192.168.200.2      # HQ-CLI IP
              hostname: hq-cli.sirius-exam.org
              gateway: 192.168.200.1           # HQ-RTR

        branch:
          hosts:
            br-srv:
              ansible_host: 192.168.30.2       # BR-SRV IP
              hostname: br-srv.sirius-exam.org
              gateway: 192.168.30.1            # BR-RTR

      vars:
        ansible_user: root
        ansible_password: "P@ssw0rd"
        ansible_connection: ssh
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        ansible_python_interpreter: /usr/bin/python3

    # ── Eltex ESR routers ──
    eltex:
      hosts:
        hq-rtr:
          ansible_host: 172.16.1.2             # HQ-RTR uplink IP
          hostname: hq-rtr.sirius-exam.org

          # ── Interface mapping (change if physical ports differ) ──
          iface_uplink: gigabitethernet 1/0/3   # to ISP
          iface_srv: gigabitethernet 1/0/2      # to HQ-SRV
          iface_cli: gigabitethernet 1/0/1      # to HQ-CLI

        br-rtr:
          ansible_host: 172.16.2.2             # BR-RTR uplink IP
          hostname: br-rtr.sirius-exam.org

          # ── Interface mapping (change if physical ports differ) ──
          iface_uplink: gigabitethernet 1/0/3   # to ISP
          iface_srv: gigabitethernet 1/0/2      # to BR-SRV

      vars:
        ansible_connection: network_cli
        ansible_network_os: eltex.esr.esr
        ansible_user: admin
        ansible_password: "P@ssw0rd"
        ansible_become: false
        ansible_become_method: enable
        ansible_become_password: "P@ssw0rd"
